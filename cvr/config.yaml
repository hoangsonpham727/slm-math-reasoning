generation:
  temperature: 0.7
  top_p: 0.9
  max_new_tokens_per_step: 256
  max_steps: 12
  num_chains: 5

verification:
  consistency_votes: 3        # NCV@3 default
  relevance_votes: 3
  enable_relevance: true
  max_output_tokens: 64
  verification_temperature: 0.3

# Optional: use a cloud model for verification only.
# Generation stays on the local SLM; only binary verify calls go to the cloud.
# Remove or set enabled: false to verify with the local SLM.
verifier_cloud:
  enabled: true
  host: "https://ollama.com"    # Ollama cloud endpoint
  model: "gpt-oss:120b"         # model name as registered in Ollama
  # api_key: read from OLLAMA_API_KEY env var (set via load_dotenv or export)

restart:
  max_restarts: 2
  temperature_increment: 0.15
