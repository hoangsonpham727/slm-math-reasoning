generation:
  temperature: 0.7
  top_p: 0.9
  max_new_tokens_per_step: 256   # kept for restart compatibility
  max_new_tokens_full_solution: 1024   # budget for full solution generation
  max_steps: 12
  num_chains: 5

verification:
  consistency_votes: 1        # 1 call to gpt-oss:120b is sufficient; reduces burst rate limiting
  relevance_votes: 1
  enable_relevance: true
  max_output_tokens: 64
  verification_temperature: 0.3
  call_delay_s: 0.0           # no delay needed for local Ollama

# Optional: use a cloud model for verification only.
# Generation stays on the local SLM; only binary verify calls go to the cloud.
# Remove or set enabled: false to verify with the local SLM.
# Local HuggingFace verifier (preferred — no rate limits, fully local)
verifier_local_hf:
  enabled: true
  model_id: "Qwen/Qwen3.5-9B"
  device: "auto"
  quantization: "none"   # "none" (bf16, ~16 GB) | "4bit" (~5 GB) | "8bit" (~9 GB)

# Cloud Ollama verifier (fallback — requires OLLAMA_API_KEY or local Ollama server)
verifier_cloud:
  enabled: false
  host: "http://localhost:11434"
  model: "qwen2.5-math:7b-instruct"

restart:
  max_restarts: 2
  temperature_increment: 0.15
